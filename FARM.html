<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<tittle>SRINIVAS FARMING</tittle>
<title>Smart Farming Advisor</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#4CAF50,#8BC34A);
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:green;
margin-bottom:20px;
}

label{
font-weight:bold;
margin-top:15px;
display:block;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:25px;
background:green;
color:white;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#006400;
}

.result{
margin-top:25px;
padding:20px;
background:#f1f8e9;
border-left:6px solid green;
display:none;
border-radius:8px;
}

.result h2{
color:green;
margin-bottom:15px;
}

.footer{
text-align:center;
margin-top:25px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<h1>🌾 Smart Farming Advisor</h1>

<label>Farmer Name</label>
<input type="text" id="farmer" placeholder="Enter your name">

<label>Select Crop</label>

<select id="crop">
<option value="">Choose Crop</option>
<option>Rice</option>
<option>Cotton</option>
<option>Tomato</option>
<option>Maize</option>
<option>Chilli</option>
<option>Groundnut</option>
</select>

<label>Soil Type</label>

<select id="soil">
<option value="">Choose Soil</option>
<option>Black Soil</option>
<option>Red Soil</option>
<option>Clay Soil</option>
<option>Sandy Soil</option>
</select>

<label>Select Pest/Disease</label>

<select id="pest">
<option value="">Choose Pest</option>
<option>Stem Borer</option>
<option>Brown Plant Hopper</option>
<option>Aphids</option>
<option>Leaf Spot</option>
<option>Armyworm</option>
<option>Whitefly</option>
</select>

<button onclick="recommend()">
Get Recommendation
</button>

<div class="result" id="result"></div>

<div class="footer">
Designed for Smart Agriculture 🌱
</div>

</div>

<script>

function recommend(){

let farmer=document.getElementById("farmer").value;
let crop=document.getElementById("crop").value;
let soil=document.getElementById("soil").value;
let pest=document.getElementById("pest").value;

if(farmer=="" || crop=="" || soil=="" || pest==""){

alert("Please fill all details.");
return;

}

let pesticide="";
let fertilizer="";
let irrigation="";
let tips="";

if(crop=="Rice"){

fertilizer="Urea + DAP";
irrigation="Maintain standing water (2-5 cm).";

if(pest=="Stem Borer"){
pesticide="Cartap Hydrochloride";
tips="Spray in the early morning or evening.";
}

else if(pest=="Brown Plant Hopper"){
pesticide="Imidacloprid";
tips="Avoid excessive nitrogen fertilizer.";
}

else{
pesticide="Consult Agricultural Officer";
tips="Monitor the crop regularly.";
}

}

else if(crop=="Cotton"){

fertilizer="NPK 20:20:20";
irrigation="Water every 6-7 days.";

if(pest=="Aphids"){
pesticide="Thiamethoxam";
tips="Remove heavily infected leaves.";
}
else if(pest=="Whitefly"){
pesticide="Acetamiprid";
tips="Use yellow sticky traps.";
}
else{
pesticide="Consult Agricultural Officer";
tips="Inspect field weekly.";
}

}

else if(crop=="Tomato"){

fertilizer="Vermicompost + NPK";
irrigation="Water every 3-4 days.";

if(pest=="Leaf Spot"){
pesticide="Mancozeb";
tips="Avoid overhead watering.";
}
else{
pesticide="Copper Oxychloride";
tips="Remove infected leaves.";
}

}

else if(crop=="Maize"){

fertilizer="Urea";
irrigation="Water every 5 days.";

if(pest=="Armyworm"){
pesticide="Emamectin Benzoate";
tips="Inspect leaves frequently.";
}
else{
pesticide="Lambda Cyhalothrin";
tips="Keep field weed-free.";
}

}

else if(crop=="Chilli"){

fertilizer="Potash Rich Fertilizer";
irrigation="Every 4 days.";
pesticide="Spinosad";
tips="Maintain field hygiene.";

}

else if(crop=="Groundnut"){

fertilizer="Gypsum + DAP";
irrigation="Every 7 days.";
pesticide="Chlorpyrifos";
tips="Rotate crops every season.";

}

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`

<h2>Hello ${farmer} 👨‍🌾</h2>

<p><b>Crop :</b> ${crop}</p>

<p><b>Soil :</b> ${soil}</p>

<p><b>Pest :</b> ${pest}</p>

<hr>

<p>💊 <b>Pesticide:</b> ${pesticide}</p>

<p>🌿 <b>Fertilizer:</b> ${fertilizer}</p>

<p>💧 <b>Irrigation:</b> ${irrigation}</p>

<p>✅ <b>Tips:</b> ${tips}</p>

`;

}

</script>

</body>
</html>
